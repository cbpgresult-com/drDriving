<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBPG Result - Student Result</title>
<meta name="robots" content="noindex,nofollow">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

html,body{
height:100%;
}

body{
height:100vh;
background:#0f172a;
display:flex;
flex-direction:column;
padding:8px;
overflow:hidden;
}

.pdf-wrap{
flex:1;
min-height:0;
position:relative;
border-radius:10px;
overflow:hidden;
background:#fff;
}

#pdfLoader{
position:absolute;
top:0;left:0;right:0;bottom:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fff;
z-index:5;
}

.pdf-loading{display:flex;gap:10px;}
.pdf-loading span{
width:14px;
height:14px;
border-radius:50%;
background:#2563eb;
animation:dotJump 0.8s infinite ease-in-out;
}
.pdf-loading span:nth-child(2){animation-delay:.15s;}
.pdf-loading span:nth-child(3){animation-delay:.3s;}

@keyframes dotJump{
0%,80%,100%{transform:translateY(0);opacity:.5;}
40%{transform:translateY(-12px);opacity:1;}
}

.pdf-text{
margin-top:18px;
font-size:16px;
font-weight:600;
color:#2563eb;
}

#resultFrame{
width:100%;
height:100%;
border:none;
background:#fff;
display:none;
}

.download-btn{
margin-top:8px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
display:none;
flex-shrink:0;
}

.error-box{
margin:auto;
text-align:center;
font-size:16px;
font-weight:600;
color:#fecaca;
padding:20px;
}

#downloadLoader{
display:none;
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
width:100%;
pointer-events:none;
}

.download-card{
width:450px;
max-width:95vw;
background:#fff;
border-radius:16px;
padding:14px 16px;
box-shadow:0 10px 30px rgba(0,0,0,.18);
pointer-events:auto;
margin:0 auto;
}

.download-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
font-weight:600;
margin-bottom:10px;
color:#111827;
}

.progress-bar{
width:100%;
height:8px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

#progressFill{
width:0%;
height:100%;
background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e);
border-radius:999px;
transition:width .25s ease;
}

#downloadText{
margin-top:8px;
font-size:12px;
color:#6b7280;
}
</style>
</head>

<body>

<div class="pdf-wrap">
<div id="pdfLoader">
<div class="pdf-loading"><span></span><span></span><span></span></div>
<p class="pdf-text">Loading PDF...</p>
</div>

<iframe id="resultFrame"></iframe>

<div id="errorBox" class="error-box" style="display:none;"></div>
</div>

<button id="actionBtn" class="download-btn" onclick="openFullResult()">
📄 Download Result
</button>

<div id="downloadLoader">
<div class="download-card">
<div class="download-row">
<span>📥 Downloading Result PDF</span>
<span id="downloadPercent">0%</span>
</div>
<div class="progress-bar"><div id="progressFill"></div></div>
<div id="downloadText">Preparing file...</div>
</div>
</div>

<script>

/*
  GITHUB PAGES "FANCY URL" TRICK
  --------------------------------
  URL format supported: /drDriving/ROLLNO/anything.result
  e.g. https://cbpgresult-com.github.io/drDriving/24212930021/xxxx.result

  GitHub Pages serves this file (404.html) automatically whenever
  a URL doesn't match a real file/folder. We read window.location.pathname
  here, pull the roll number out of it, then fetch that student's data
  from sessionStorage (saved by index.html right before navigating here).
  The fancy URL itself is never changed.
*/

const API_URL =
"https://script.google.com/macros/s/AKfycbxE2TMnA4lpP_WgPa3_uf7wMXKIxFEkJof0tLUVUuIGUI7oVA6bn6QxQ1mZg3Ys2Oqu/exec";

function parsePath(){

  let path = window.location.pathname;

  path = path.replace(/^\/+|\/+$/g, "");

  let parts = path.split("/");

  if(parts[0] && parts[0].toLowerCase() === "drdriving"){
    parts.shift();
  }

  let roll = parts[0] || "";

  return { roll: roll };
}

function showError(msg){
  document.getElementById("pdfLoader").style.display = "none";
  document.getElementById("errorBox").style.display = "flex";
  document.getElementById("errorBox").style.alignItems = "center";
  document.getElementById("errorBox").style.justifyContent = "center";
  document.getElementById("errorBox").style.height = "100%";
  document.getElementById("errorBox").innerHTML = msg;
}

function renderResult(data, roll){

  let frame = document.getElementById("resultFrame");
  let loader = document.getElementById("pdfLoader");

  loader.style.display = "flex";

  /* Mobile browsers often refuse to render a PDF inline inside an
     <iframe> — they show only a download/open prompt instead of the
     actual pages. Google's PDF viewer embed renders identically on
     both desktop and mobile, so we route through it instead of
     loading the PDF link directly. */
  let viewerUrl =
    "https://docs.google.com/gview?embedded=true&url=" +
    encodeURIComponent(data.link);

  frame.onload = function(){
    loader.style.display = "none";
    frame.style.display = "block";
  };

  frame.src = viewerUrl;

  document.getElementById("actionBtn").style.display = "block";

  window.openFullResult = async function(){

    if(!data.link) return;

    document.getElementById("downloadLoader").style.display = "flex";

    let percent = 0;

    let timer = setInterval(function(){
      if(percent < 95){
        percent += 5;
        document.getElementById("downloadPercent").innerText = percent + "%";
        document.getElementById("progressFill").style.width = percent + "%";
        if(percent > 80){
          document.getElementById("downloadText").innerText = "Processing PDF...";
        }
      }
    },150);

    try{

      const response = await fetch(API_URL + "?download=" + encodeURIComponent(data.link));
      const base64 = await response.text();

      clearInterval(timer);

      document.getElementById("downloadPercent").innerText = "100%";
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("downloadText").innerText = "Download Completed ✓";

      let btn = document.getElementById("actionBtn");
      btn.innerHTML = "✅ Open PDF";
      btn.style.background = "#22c55e";
      btn.onclick = function(){ window.open(data.link, "_blank"); };

      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);
      for(let i=0;i<byteCharacters.length;i++){
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const blob = new Blob([new Uint8Array(byteNumbers)],{type:"application/pdf"});
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;

      if(data.examType === "BACKPAPER"){
        a.download = roll + "_BackPaper_Sem_" + data.sem + ".pdf";
      }else{
        a.download = roll + "_Sem_" + data.sem + ".pdf";
      }

      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      setTimeout(function(){
        document.getElementById("downloadLoader").style.display = "none";
        document.getElementById("downloadPercent").innerText = "0%";
        document.getElementById("progressFill").style.width = "0%";
        document.getElementById("downloadText").innerText = "Preparing file...";
      },500);

    }catch(e){
      clearInterval(timer);
      document.getElementById("downloadLoader").style.display = "none";
      alert("Download Failed");
    }
  };
}

(function init(){

  let { roll } = parsePath();

  if(!roll){
    showError("⚠ Invalid result link.");
    return;
  }

  let saved = null;

  try{
    saved = JSON.parse(sessionStorage.getItem("cbpg_result_" + roll) || "null");
  }catch(e){
    saved = null;
  }

  if(saved && saved.link){

    renderResult(saved, roll);

  }else{

    showError(
      "⚠ Result data not found for this link.<br>" +
      "Please search again from the <a href='/drDriving/' style='color:#93c5fd;'>home page</a>."
    );

  }

})();

document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
document.addEventListener("keydown", function(e){ if (e.keyCode == 123){ e.preventDefault(); } });

</script>

</body>
</html>
