<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBPG Result - Your Result</title>
<meta name="robots" content="noindex,nofollow">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb,#06b6d4);padding:15px;}
.page-wrap{width:100%;max-width:1200px;margin:0 auto;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.back-link{color:#fff;text-decoration:none;font-weight:600;font-size:14px;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:10px;}
.result-card{width:100%;background:#fff;border-radius:20px;padding:20px;text-align:center;min-height:80vh;display:flex;flex-direction:column;}
.status-box{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.success{width:60px;height:60px;margin:0 auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;background:#22c55e;}
.fail-icon{width:60px;height:60px;margin:0 auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;background:#ef4444;}
.status-title{font-size:20px;font-weight:700;color:#111827;margin-bottom:6px;}
.status-sub{font-size:14px;color:#6b7280;}
.student-name{display:inline-block;margin:6px auto;padding:8px 16px;font-size:15px;font-weight:600;color:#fff;
background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e);background-size:300% 300%;border-radius:10px;
border:2px solid rgba(255,255,255,.8);animation:gradientMove 3s linear infinite;max-width:90%;word-break:break-word;}
@keyframes gradientMove{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
.student-semester{margin-bottom:10px;font-size:13px;font-weight:500;color:#6b7280;}
#pdfLoader{display:none;flex:1;justify-content:center;align-items:center;flex-direction:column;}
.pdf-loading{display:flex;gap:10px;}
.pdf-loading span{width:14px;height:14px;border-radius:50%;background:#2563eb;animation:dotJump .8s infinite ease-in-out;}
.pdf-loading span:nth-child(2){animation-delay:.15s;}
.pdf-loading span:nth-child(3){animation-delay:.3s;}
@keyframes dotJump{0%,80%,100%{transform:translateY(0);opacity:.5;}40%{transform:translateY(-12px);opacity:1;}}
.pdf-text{margin-top:18px;font-size:16px;font-weight:600;color:#2563eb;}
#resultFrame{width:100%;flex:1;border:none;border-radius:12px;background:#fff;display:none;}
.download-btn{width:100%;max-width:400px;margin:12px auto 0;padding:14px;border:none;border-radius:12px;
background:linear-gradient(45deg,#2563eb,#06b6d4);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:none;}
#downloadLoader{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999999;width:100%;pointer-events:none;}
.download-card{width:450px;max-width:95vw;margin:0 auto;background:#fff;border-radius:16px;padding:14px 16px;
box-shadow:0 10px 30px rgba(0,0,0,.18);pointer-events:auto;}
.download-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;margin-bottom:10px;color:#111827;}
.progress-bar{width:100%;height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;}
#progressFill{width:0%;height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e);border-radius:999px;transition:width .25s ease;}
#downloadText{margin-top:8px;font-size:12px;color:#6b7280;}
</style>
</head>

<body>

<div class="page-wrap">

<div class="top-bar">
<a class="back-link" href="index.html">&larr; New Search</a>
</div>

<div class="result-card">

<div class="status-box" id="loadingBox">
<div class="pdf-loading"><span></span><span></span><span></span></div>
<div class="status-title" style="margin-top:14px;">Fetching Result...</div>
</div>

<div class="status-box" id="notFoundBox">
<div class="fail-icon">✕</div>
<div class="status-title">Result Not Found</div>
<div class="status-sub">Record not available. Please check your details and search again.</div>
</div>

<div class="status-box" id="errorBox">
<div class="fail-icon">!</div>
<div class="status-title">Something Went Wrong</div>
<div class="status-sub" id="errorMsg">Please check your internet connection and try again.</div>
</div>

<div id="foundBox" style="display:none; flex:1; flex-direction:column;">
<div class="success">✓</div>
<div class="status-title" style="color:#16a34a;">Result Found</div>
<div class="student-name" id="studentName"></div>
<div class="student-semester" id="studentSemester"></div>

<div id="pdfLoader">
<div class="pdf-loading"><span></span><span></span><span></span></div>
<p class="pdf-text">Loading PDF...</p>
</div>

<iframe id="resultFrame"></iframe>

<button id="actionBtn" class="download-btn">📄 Download Result</button>
</div>

</div>

</div>

<div id="downloadLoader">
<div class="download-card">
<div class="download-row"><span>📥 Downloading Result PDF</span><span id="downloadPercent">0%</span></div>
<div class="progress-bar"><div id="progressFill"></div></div>
<div id="downloadText">Preparing file...</div>
</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxE2TMnA4lpP_WgPa3_uf7wMXKIxFEkJof0tLUVUuIGUI7oVA6bn6QxQ1mZg3Ys2Oqu/exec";

let resultLink = "";

const qs = new URLSearchParams(window.location.search);
const roll = qs.get("roll") || "";
const examType = qs.get("examType") || "";
const course = qs.get("course") || "";
const sem = qs.get("sem") || "";
const father = qs.get("father") || "";
const year = qs.get("year") || "";

function showBox(id){
["loadingBox","notFoundBox","errorBox","foundBox"].forEach(function(b){
document.getElementById(b).style.display = "none";
});
document.getElementById(id).style.display = "flex";
}

if(!roll || !year || !examType || !course || !sem || !father){
showBox("errorBox");
document.getElementById("errorMsg").innerText = "Missing search details. Please go back and search again.";
}else{

showBox("loadingBox");

let url = API_URL +
"?year=" + encodeURIComponent(year) +
"&roll=" + encodeURIComponent(roll) +
"&examType=" + encodeURIComponent(examType) +
"&course=" + encodeURIComponent(course) +
"&sem=" + encodeURIComponent(sem) +
"&father=" + encodeURIComponent(father);

const timeout = setTimeout(function(){
showBox("errorBox");
document.getElementById("errorMsg").innerText = "Internet Slow. Please try again.";
}, 12000);

fetch(url)
.then(function(response){ return response.json(); })
.then(function(data){
clearTimeout(timeout);

if(data.status === "found"){
showBox("foundBox");

document.getElementById("studentName").innerHTML = "👨‍🎓 " + (data.student || "Student");

if(examType === "BACKPAPER"){
document.getElementById("studentSemester").innerHTML = "Semester : " + sem + " (BACK PAPER) " + year;
}else{
document.getElementById("studentSemester").innerHTML = "Semester : " + sem + " (" + year + ")";
}

resultLink = data.link || "";

let frame = document.getElementById("resultFrame");
let pdfLoader = document.getElementById("pdfLoader");
let btn = document.getElementById("actionBtn");

pdfLoader.style.display = "flex";
btn.style.display = "block";
btn.onclick = openFullResult;

frame.onload = function(){
pdfLoader.style.display = "none";
frame.style.display = "block";
};

frame.src = resultLink;

}else{
showBox("notFoundBox");
}

})
.catch(function(err){
clearTimeout(timeout);
showBox("errorBox");
document.getElementById("errorMsg").innerText = "No Internet. Please connect and try again.";
});

}

async function openFullResult(){

if(!resultLink) return;

document.getElementById("downloadLoader").style.display = "flex";

let percent = 0;

let timer = setInterval(function(){
if(percent < 95){
percent += 5;
document.getElementById("downloadPercent").innerText = percent + "%";
document.getElementById("progressFill").style.width = percent + "%";
if(percent > 80){
document.getElementById("downloadText").innerText = "Processing PDF...";
}
}
}, 150);

try{

const response = await fetch(API_URL + "?download=" + encodeURIComponent(resultLink));
const base64 = await response.text();

clearInterval(timer);

document.getElementById("downloadPercent").innerText = "100%";
document.getElementById("progressFill").style.width = "100%";
document.getElementById("downloadText").innerText = "Download Completed ✓";

let btn = document.getElementById("actionBtn");
btn.innerHTML = "✅ Open PDF";
btn.style.background = "#22c55e";
btn.onclick = function(){ window.open(resultLink, "_blank"); };

const byteCharacters = atob(base64);
const byteNumbers = new Array(byteCharacters.length);

for(let i = 0; i < byteCharacters.length; i++){
byteNumbers[i] = byteCharacters.charCodeAt(i);
}

const blob = new Blob([new Uint8Array(byteNumbers)], {type:"application/pdf"});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");

a.href = url;

if(examType === "BACKPAPER"){
a.download = roll + "_BackPaper_Sem_" + sem + ".pdf";
}else{
a.download = roll + "_Sem_" + sem + ".pdf";
}

document.body.appendChild(a);
a.click();
a.remove();
URL.revokeObjectURL(url);

setTimeout(function(){
document.getElementById("downloadLoader").style.display = "none";
document.getElementById("downloadPercent").innerText = "0%";
document.getElementById("progressFill").style.width = "0%";
document.getElementById("downloadText").innerText = "Preparing file...";
}, 500);

}catch(e){
clearInterval(timer);
document.getElementById("downloadLoader").style.display = "none";
alert("Download Failed");
}

}

document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
document.addEventListener("keydown", function(e){ if(e.keyCode == 123){ e.preventDefault(); } });

</script>

</body>
</html>
