<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBPG Result - Student Result</title>
<meta name="robots" content="noindex,nofollow">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb,
#06b6d4
);
display:flex;
flex-direction:column;
align-items:center;
padding:15px;
}

.result-card{
width:100%;
max-width:1200px;
background:#fff;
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
min-height:90vh;
box-shadow:0 15px 50px rgba(0,0,0,.3);
position:relative;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.back-btn{
border:none;
background:#ef4444;
color:#fff;
padding:8px 16px;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.success{
width:42px;
height:42px;
font-size:22px;
margin:0 auto 5px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
background:#22c55e;
}

.popup-title{
font-size:14px;
font-weight:700;
margin-bottom:4px;
color:#16a34a;
text-align:center;
}

.student-name{
display:inline-block;
margin:4px auto 6px;
padding:6px 12px;
font-size:13px;
font-weight:600;
line-height:1.4;
color:#fff;
background:linear-gradient(
90deg,
#2563eb,
#06b6d4,
#22c55e
);
background-size:300% 300%;
border-radius:10px;
border:2px solid rgba(255,255,255,.8);
animation:
gradientMove 3s linear infinite,
blinkBorder 1s infinite alternate;
box-shadow:0 0 10px rgba(37,99,235,.4);
max-width:90%;
word-break:break-word;
text-align:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

@keyframes blinkBorder{
0%{border-color:#fff;box-shadow:0 0 5px #fff;}
100%{border-color:#22c55e;box-shadow:0 0 15px #22c55e;}
}

.center-block{
display:flex;
flex-direction:column;
align-items:center;
}

.roll-display{
text-align:center;
font-size:12px;
color:#6b7280;
margin-bottom:2px;
font-weight:500;
}

.student-semester{
margin-top:0;
margin-bottom:5px;
font-size:13px;
font-weight:500;
color:#6b7280;
text-align:center;
}

#pdfLoader{
flex:1;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fff;
border-radius:12px;
}

.pdf-loading{
display:flex;
gap:10px;
}

.pdf-loading span{
width:14px;
height:14px;
border-radius:50%;
background:#2563eb;
animation:dotJump 0.8s infinite ease-in-out;
}

.pdf-loading span:nth-child(2){animation-delay:.15s;}
.pdf-loading span:nth-child(3){animation-delay:.3s;}

@keyframes dotJump{
0%,80%,100%{transform:translateY(0);opacity:.5;}
40%{transform:translateY(-12px);opacity:1;}
}

.pdf-text{
margin-top:18px;
font-size:18px;
font-weight:600;
color:#2563eb;
}

#resultFrame{
width:100%;
flex:1;
border:none;
border-radius:12px;
background:#fff;
}

.download-btn{
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.error-box{
margin:auto;
text-align:center;
font-size:16px;
font-weight:600;
color:#b91c1c;
}

#downloadLoader{
display:none;
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:999999;
width:100%;
pointer-events:none;
}

.download-card{
width:450px;
max-width:95vw;
background:#fff;
border-radius:16px;
padding:14px 16px;
box-shadow:0 10px 30px rgba(0,0,0,.18);
pointer-events:auto;
margin:0 auto;
}

.download-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
font-weight:600;
margin-bottom:10px;
color:#111827;
}

.progress-bar{
width:100%;
height:8px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

#progressFill{
width:0%;
height:100%;
background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e);
border-radius:999px;
transition:width .25s ease;
}

#downloadText{
margin-top:8px;
font-size:12px;
color:#6b7280;
}

@media(max-width:768px){
.result-card{
padding:10px;
}
}
</style>
</head>

<body>

<div class="result-card">

<div class="top-bar">
<button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
<div style="width:80px;"></div>
</div>

<div class="center-block">
<div class="success">✓</div>
<div class="popup-title">Result Found</div>
<div class="student-name" id="studentName"></div>
<div class="roll-display" id="rollDisplay"></div>
<div class="student-semester" id="studentSemester"></div>
</div>

<div id="pdfLoader">
<div class="pdf-loading">
<span></span><span></span><span></span>
</div>
<p class="pdf-text">Loading PDF...</p>
</div>

<iframe id="resultFrame" style="display:none;"></iframe>

<div id="errorBox" class="error-box" style="display:none;"></div>

<button id="actionBtn" class="download-btn" style="display:none" onclick="openFullResult()">
📄 Download Result
</button>

</div>

<div id="downloadLoader">
<div class="download-card">
<div class="download-row">
<span>📥 Downloading Result PDF</span>
<span id="downloadPercent">0%</span>
</div>
<div class="progress-bar">
<div id="progressFill"></div>
</div>
<div id="downloadText">Preparing file...</div>
</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxE2TMnA4lpP_WgPa3_uf7wMXKIxFEkJof0tLUVUuIGUI7oVA6bn6QxQ1mZg3Ys2Oqu/exec";

/* READ PARAMS FROM URL — roll number etc. */

const params = new URLSearchParams(window.location.search);

const roll = params.get("roll") || "";
const student = params.get("student") || "Student";
const resultLink = params.get("link") || "";
const sem = params.get("sem") || "";
const year = params.get("year") || "";
const examType = params.get("examType") || "";

if(!roll || !resultLink){

document.getElementById("errorBox").style.display = "block";
document.getElementById("errorBox").innerHTML =
"⚠ Invalid or expired result link. Please search again from the home page.";

}else{

/* Roll number ke saath page ka URL update karo (bina reload kiye)
   taaki address bar me roll number dikhta rahe, jaise
   result.html?roll=XXXX ki jagah /24212930021-result jaisa look mile */

try{
history.replaceState(null, "", "result.html?roll=" + encodeURIComponent(roll));
}catch(e){}

document.getElementById("studentName").innerHTML =
"👨‍🎓 " + student;

document.getElementById("rollDisplay").innerHTML =
"Roll No : " + roll;

if(examType === "BACKPAPER" || examType === "BACK PAPER"){

document.getElementById("studentSemester").innerHTML =
"Semester : " + sem + " (BACK PAPER) " + year;

}else{

document.getElementById("studentSemester").innerHTML =
"Semester : " + sem + " (" + year + ")";

}

let frame = document.getElementById("resultFrame");
let loader = document.getElementById("pdfLoader");

loader.style.display = "flex";

frame.onload = function(){
loader.style.display = "none";
frame.style.display = "block";
};

frame.src = resultLink;

document.getElementById("actionBtn").style.display = "block";

}

/* DOWNLOAD RESULT PDF */

async function openFullResult(){

if(!resultLink) return;

document.getElementById("downloadLoader").style.display = "flex";

let percent = 0;

let timer = setInterval(function(){

if(percent < 95){

percent += 5;

document.getElementById("downloadPercent").innerText = percent + "%";
document.getElementById("progressFill").style.width = percent + "%";

if(percent > 80){
document.getElementById("downloadText").innerText = "Processing PDF...";
}
}

},150);

try{

const response = await fetch(
API_URL + "?download=" + encodeURIComponent(resultLink)
);

const base64 = await response.text();

clearInterval(timer);

document.getElementById("downloadPercent").innerText = "100%";
document.getElementById("progressFill").style.width = "100%";
document.getElementById("downloadText").innerText = "Download Completed ✓";

let btn = document.getElementById("actionBtn");
btn.innerHTML = "✅ Open PDF";
btn.style.background = "#22c55e";
btn.onclick = function(){
window.open(resultLink, "_blank");
};

const byteCharacters = atob(base64);
const byteNumbers = new Array(byteCharacters.length);

for(let i=0;i<byteCharacters.length;i++){
byteNumbers[i] = byteCharacters.charCodeAt(i);
}

const blob = new Blob([new Uint8Array(byteNumbers)],{type:"application/pdf"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;

if(examType === "BACKPAPER"){
a.download = roll + "_BackPaper_Sem_" + sem + ".pdf";
}else{
a.download = roll + "_Sem_" + sem + ".pdf";
}

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

setTimeout(function(){
document.getElementById("downloadLoader").style.display = "none";
document.getElementById("downloadPercent").innerText = "0%";
document.getElementById("progressFill").style.width = "0%";
document.getElementById("downloadText").innerText = "Preparing file...";
},500);

}catch(e){

clearInterval(timer);
document.getElementById("downloadLoader").style.display = "none";
alert("Download Failed");

}

}

document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

document.addEventListener("keydown", function(e){
if (e.keyCode == 123){
e.preventDefault();
}
});

</script>

</body>
</html>
